name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install TA-Lib C library
        run: |
          sudo apt-get update
          sudo apt-get install -y ta-lib || {
            wget https://github.com/ta-lib/ta-lib/releases/download/v0.4.0/ta-lib_0.4.0_amd64.deb
            sudo dpkg -i ta-lib_0.4.0_amd64.deb || sudo apt-get install -f -y
          }

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check alphagauntlet examples tests

      - name: Test
        run: pytest -q
